<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="350" viewBox="0 0 1200 350" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- Gradients -->
    <linearGradient id="bg-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="30%" stop-color="#12121f"/>
      <stop offset="70%" stop-color="#0d0d18"/>
      <stop offset="100%" stop-color="#0a0a12"/>
    </linearGradient>
    
    <linearGradient id="accent-purple" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    
    <linearGradient id="accent-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    
    <linearGradient id="accent-pink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    
    <linearGradient id="orb-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.1"/>
    </linearGradient>
    
    <linearGradient id="orb-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.05"/>
    </linearGradient>
    
    <linearGradient id="line-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7c3aed" stop-opacity="1"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </linearGradient>
    
    <!-- Filters -->
    <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="glow-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="blur-heavy" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
    
    <!-- Clip paths -->
    <clipPath id="circuit-clip">
      <rect x="0" y="0" width="1200" height="350"/>
    </clipPath>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="350" fill="url(#bg-main)"/>
  
  <!-- Large ambient orbs -->
  <ellipse cx="150" cy="200" rx="250" ry="200" fill="url(#orb-purple)" filter="url(#blur-heavy)"/>
  <ellipse cx="1050" cy="150" rx="200" ry="180" fill="url(#orb-cyan)" filter="url(#blur-heavy)"/>
  <ellipse cx="600" cy="100" rx="150" ry="120" fill="#7c3aed" opacity="0.15" filter="url(#blur-heavy)"/>
  
  <!-- Grid pattern -->
  <g stroke="#1f1f35" stroke-width="0.5" opacity="0.4">
    <!-- Vertical lines -->
    <line x1="0" y1="0" x2="0" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="350"/>
    <line x1="200" y1="0" x2="200" y2="350"/>
    <line x1="300" y1="0" x2="300" y2="350"/>
    <line x1="400" y1="0" x2="400" y2="350"/>
    <line x1="500" y1="0" x2="500" y2="350"/>
    <line x1="600" y1="0" x2="600" y2="350"/>
    <line x1="700" y1="0" x2="700" y2="350"/>
    <line x1="800" y1="0" x2="800" y2="350"/>
    <line x1="900" y1="0" x2="900" y2="350"/>
    <line x1="1000" y1="0" x2="1000" y2="350"/>
    <line x1="1100" y1="0" x2="1100" y2="350"/>
    <line x1="1200" y1="0" x2="1200" y2="350"/>
    <!-- Horizontal lines -->
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
  </g>
  
  <!-- Circuit lines decoration -->
  <g stroke="url(#accent-purple)" stroke-width="1" fill="none" opacity="0.3">
    <path d="M0,280 L100,280 L120,260 L200,260"/>
    <path d="M1000,70 L1080,70 L1100,90 L1200,90"/>
    <path d="M200,350 L200,300 L250,300 L270,280"/>
    <path d="M900,0 L900,40 L950,40 L970,60"/>
  </g>
  
  <!-- Hexagon mesh -->
  <g fill="none" stroke="url(#accent-cyan)" stroke-width="0.5" opacity="0.2">
    <!-- Top left cluster -->
    <polygon points="80,60 120,45 160,60 160,100 120,115 80,100"/>
    <polygon points="120,45 160,30 200,45 200,85 160,100 120,85"/>
    <polygon points="160,100 200,85 240,100 240,140 200,155 160,140"/>
    
    <!-- Bottom right cluster -->
    <polygon points="1020,250 1060,235 1100,250 1100,290 1060,305 1020,290"/>
    <polygon points="1060,235 1100,220 1140,235 1140,275 1100,290 1060,275"/>
    <polygon points="1060,295 1100,280 1140,295 1140,335 1100,350 1060,335"/>
    
    <!-- Middle scattered -->
    <polygon points="500,280 540,265 580,280 580,320 540,335 500,320"/>
    <polygon points="750,50 790,35 830,50 830,90 790,105 750,90"/>
  </g>
  
  <!-- Glowing accent lines -->
  <line x1="0" y1="175" x2="450" y2="175" stroke="url(#line-glow)" stroke-width="1" filter="url(#glow-soft)"/>
  <line x1="750" y1="175" x2="1200" y2="175" stroke="url(#accent-cyan)" stroke-width="1" opacity="0.5" filter="url(#glow-soft)"/>
  
  <!-- Animated wave path -->
  <path d="M0,200 Q150,170 300,200 T600,200 T900,200 T1200,200" stroke="url(#accent-purple)" stroke-width="2" fill="none" opacity="0.4" filter="url(#glow-strong)"/>
  <path d="M0,210 Q150,180 300,210 T600,210 T900,210 T1200,210" stroke="url(#accent-cyan)" stroke-width="1" fill="none" opacity="0.3" filter="url(#glow-strong)"/>
  
  <!-- Main content area background -->
  <rect x="250" y="120" width="700" height="110" rx="8" fill="#0f0f1a" opacity="0.6"/>
  <rect x="250" y="120" width="700" height="110" rx="8" fill="none" stroke="url(#accent-purple)" stroke-width="1" opacity="0.3"/>
  
  <!-- Decorative corners -->
  <g stroke="url(#accent-purple)" stroke-width="2" fill="none" opacity="0.6">
    <path d="M260,130 L260,140 L270,140"/>
    <path d="M940,130 L940,140 L930,140"/>
    <path d="M260,220 L260,210 L270,210"/>
    <path d="M940,220 L940,210 L930,210"/>
  </g>
  
  <!-- Glowing dots -->
  <circle cx="260" cy="135" r="3" fill="#7c3aed" filter="url(#glow-strong)"/>
  <circle cx="940" cy="135" r="3" fill="#06b6d4" filter="url(#glow-strong)"/>
  <circle cx="260" cy="215" r="3" fill="#06b6d4" filter="url(#glow-strong)"/>
  <circle cx="940" cy="215" r="3" fill="#7c3aed" filter="url(#glow-strong)"/>
  
  <!-- Floating particles -->
  <g fill="#7c3aed" opacity="0.6">
    <circle cx="350" cy="80" r="2"/>
    <circle cx="500" cy="60" r="1.5"/>
    <circle cx="750" cy="90" r="2"/>
    <circle cx="900" cy="70" r="1.5"/>
    <circle cx="150" cy="280" r="2"/>
    <circle cx="400" cy="300" r="1.5"/>
    <circle cx="800" cy="290" r="2"/>
    <circle cx="1050" cy="280" r="1.5"/>
  </g>
  
  <g fill="#06b6d4" opacity="0.5">
    <circle cx="200" cy="100" r="1.5"/>
    <circle cx="650" cy="50" r="2"/>
    <circle cx="850" cy="120" r="1.5"/>
    <circle cx="100" cy="250" r="2"/>
    <circle cx="550" cy="310" r="1.5"/>
    <circle cx="950" cy="300" r="2"/>
  </g>
  
  <!-- Code symbols background -->
  <text x="50" y="180" fill="#7c3aed" font-family="monospace" font-size="80" opacity="0.08">&lt;/&gt;</text>
  <text x="1000" y="280" fill="#06b6d4" font-family="monospace" font-size="60" opacity="0.08">#</text>
  <text x="900" y="100" fill="#ec4899" font-family="monospace" font-size="40" opacity="0.06">_</text>
  <text x="50" y="300" fill="#22d3ee" font-family="monospace" font-size="30" opacity="0.05">{ }</text>
  <text x="1100" y="180" fill="#a855f7" font-family="monospace" font-size="35" opacity="0.05">[ ]</text>
  
  <!-- Binary rain effect (subtle) -->
  <g fill="#7c3aed" font-family="monospace" font-size="10" opacity="0.1">
    <text x="100" y="150">01001</text>
    <text x="130" y="170">11010</text>
    <text x="1050" y="150">10110</text>
    <text x="1080" y="200">00101</text>
    <text x="300" y="320">01101</text>
    <text x="800" y="330">10010</text>
  </g>
  
  <!-- Scan line effect -->
  <rect x="0" y="174" width="1200" height="2" fill="url(#accent-purple)" opacity="0.1"/>
</svg>